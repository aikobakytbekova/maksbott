<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>День рождения Макса</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top left, #ffe66d, transparent 30%),
                  radial-gradient(circle at bottom right, #ff6bcb, transparent 35%),
                  linear-gradient(135deg, #111827, #312e81, #7c3aed);
      color: white;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .bubble {
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px);
      animation: float 7s infinite ease-in-out;
    }

    .bubble:nth-child(1) { width: 80px; height: 80px; top: 8%; left: 8%; }
    .bubble:nth-child(2) { width: 45px; height: 45px; top: 18%; right: 12%; animation-delay: 1s; }
    .bubble:nth-child(3) { width: 110px; height: 110px; bottom: 10%; right: 8%; animation-delay: 2s; }
    .bubble:nth-child(4) { width: 55px; height: 55px; bottom: 18%; left: 10%; animation-delay: 3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-22px); }
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 14px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 12px;
    }

   h1 span {
    display: block;
    font-size: 58px;
    background: linear-gradient(90deg, #fef08a, #fb7185, #a78bfa);
    
    -webkit-background-clip: text; /* для Chrome/Safari */
    background-clip: text;         /* стандарт */

    color: transparent;
    text-shadow: none;
}

    .subtitle {
      font-size: 18px;
      line-height: 1.5;
      color: #f4f4f5;
      margin-bottom: 24px;
    }

    .info {
      display: grid;
      gap: 12px;
      margin: 22px 0;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      padding: 15px;
      text-align: left;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      font-size: 22px;
      flex-shrink: 0;
    }

    .info-item b {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .info-item p {
      color: #e5e7eb;
      font-size: 14px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    button, a.button {
      border: none;
      border-radius: 18px;
      padding: 15px 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover, a.button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .yes {
      background: #fef08a;
      color: #111827;
    }

    .map {
      background: rgba(255, 255, 255, 0.16);
      color: white;
    }

    .footer {
      margin-top: 22px;
      font-size: 13px;
      color: #e5e7eb;
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      background: #fef08a;
      animation: fall 4s linear infinite;
      opacity: 0.9;
      z-index: 1;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 16px;
        align-items: flex-start;
        padding-top: 42px;
      }

      .card {
        border-radius: 28px;
        padding: 24px 20px;
      }

      h1 {
        font-size: 34px;
      }

      h1 span {
        font-size: 50px;
      }

      .subtitle {
        font-size: 16px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <main class="card">
      <div class="badge">🎉 Ты приглашён!</div>

      <h1>День рождения <span>Макса</span></h1>

      <p class="subtitle">
        Будет весело, громко и очень вкусно. Приходи отмечать вместе с нами!
      </p>

      <section class="info">
        <div class="info-item">
          <div class="icon">📅</div>
          <div>
            <b>Дата</b>
            <p>20 мая 2026 года</p>
          </div>
        </div>

        <div class="info-item">
          <div class="icon">⏰</div>
          <div>
            <b>Время</b>
            <p>18:00</p>
          </div>
        </div>

        <div class="info-item">
          <div class="icon">📍</div>
          <div>
            <b>Место</b>
            <p>хзхз</p>
          </div>
        </div>

        <div class="info-item">
          <div class="icon">🎁</div>
          <div>
            <b>Дресс-код</b>
            <p>Настроение — праздничное, стиль — свободный</p>
          </div>
        </div>
      </section>

      <div class="buttons">
        <button class="yes" onclick="alert('Супер! Макс будет рад 😎')">Я приду 🔥</button>
        <a class="button map" href="https://maps.google.com" target="_blank">Открыть карту</a>
      </div>

      <p class="footer">До встречи на празднике! 🥳</p>
    </main>
  </div>

  <script>
    const colors = ['#fef08a', '#fb7185', '#60a5fa', '#34d399', '#c084fc'];

    for (let i = 0; i < 35; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + 'vw';
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDelay = Math.random() * 4 + 's';
      confetti.style.animationDuration = 3 + Math.random() * 4 + 's';
      document.body.appendChild(confetti);
    }
  </script>
</body>
</html>
